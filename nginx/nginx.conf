# ══════════════════════════════════════════════════════════════════════════
# G4Lite — Production Nginx Configuration
#
# Responsibilities:
#   1. Reverse proxy /api/* to FastAPI backend
#   2. Serve React SPA static files
#   3. Security headers (defence in depth — backend also sets these)
#   4. Rate limiting on auth endpoints
#   5. SSE-compatible proxy for /api/assistant/chat
#   6. Gzip compression
#   7. Static asset caching with cache-busting support
#
# This file is mounted read-only into the nginx container:
#   volumes:
#     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
# ══════════════════════════════════════════════════════════════════════════

# Run as non-root inside the container (nginx:alpine supports this)
user  nginx;

# Auto-detect CPU cores — typically 1 for a single-container deployment
worker_processes  auto;

# Error log to stderr for Docker log collection
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;
}

http {

    # ──────────────────────────────────────────────────────────────────
    # Core settings
    # ──────────────────────────────────────────────────────────────────

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging — structured format for log aggregators
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 100;

    # Request limits
    client_max_body_size    10M;
    client_body_timeout     30s;
    client_header_timeout   30s;
    send_timeout            30s;

    # Buffer tuning
    client_body_buffer_size    16k;
    client_header_buffer_size  1k;
    large_client_header_buffers 4 8k;

    # Hide Nginx version from response headers and error pages
    server_tokens  off;

    # ──────────────────────────────────────────────────────────────────
    # Gzip compression
    # ──────────────────────────────────────────────────────────────────

    gzip             on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  5;
    gzip_min_length  256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        application/vnd.ms-fontobject
        font/opentype
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;

    # ──────────────────────────────────────────────────────────────────
    # Rate limiting zones
    # ──────────────────────────────────────────────────────────────────

    # Auth endpoints: 5 requests/second per IP, burst 10
    # Prevents brute-force login attempts
    limit_req_zone  $binary_remote_addr  zone=auth:10m  rate=5r/s;

    # General API: 30 requests/second per IP, burst 50
    # Prevents abusive scraping or runaway frontend bugs
    limit_req_zone  $binary_remote_addr  zone=api:10m   rate=30r/s;

    # Rate limit responses: 429 Too Many Requests (not 503)
    limit_req_status 429;

    # ──────────────────────────────────────────────────────────────────
    # Upstream: FastAPI backend
    # ──────────────────────────────────────────────────────────────────

    upstream backend {
        server backend:8000;

        # Keep connections alive to backend — reduces TCP handshake
        # overhead.  Must match uvicorn --timeout-keep-alive (65s).
        keepalive 16;
        keepalive_timeout 60s;
    }

    # ──────────────────────────────────────────────────────────────────
    # Server block
    # ──────────────────────────────────────────────────────────────────

    server {
        listen       80;
        server_name  _;

        # Root for React SPA static files (built and copied into image)
        root  /usr/share/nginx/html;
        index index.html;

        # ──────────────────────────────────────────────────────────────
        # Security headers (applied to ALL responses)
        # ──────────────────────────────────────────────────────────────

        add_header  X-Content-Type-Options   "nosniff"                        always;
        add_header  X-Frame-Options          "DENY"                           always;
        add_header  X-XSS-Protection         "0"                              always;
        add_header  Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header  Permissions-Policy       "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header  X-Powered-By             "G4Lite"                        always;

        # Content Security Policy — tight but allows inline styles for MUI
        add_header  Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"  always;

        # ──────────────────────────────────────────────────────────────
        # API: Authentication endpoints (strict rate limit)
        # ──────────────────────────────────────────────────────────────

        location /api/auth/login {
            limit_req  zone=auth  burst=10  nodelay;

            proxy_pass              http://backend;
            proxy_http_version      1.1;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        X-Request-ID      $request_id;
            proxy_set_header        Connection        "";
            proxy_connect_timeout   10s;
            proxy_read_timeout      30s;
            proxy_send_timeout      30s;
        }

        # ──────────────────────────────────────────────────────────────
        # API: Assistant chat — SSE streaming endpoint
        #
        # SSE requires:
        #   - No buffering (proxy_buffering off)
        #   - No gzip on the stream (handled per-location)
        #   - Long read timeout (streaming can run for minutes)
        #   - HTTP/1.1 with Connection: keep-alive
        # ──────────────────────────────────────────────────────────────

        location /api/assistant/chat {
            limit_req  zone=api  burst=10  nodelay;

            proxy_pass              http://backend;
            proxy_http_version      1.1;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        X-Request-ID      $request_id;
            proxy_set_header        Connection        "";

            # SSE-specific: disable all buffering so tokens stream
            # to the client immediately as the backend produces them
            proxy_buffering         off;
            proxy_cache             off;
            proxy_request_buffering off;
            chunked_transfer_encoding on;

            # No gzip on SSE stream — compressing a trickle of small
            # chunks adds latency with no size benefit
            gzip                    off;

            # Long timeouts — streaming responses can run for minutes
            proxy_connect_timeout   10s;
            proxy_read_timeout      600s;
            proxy_send_timeout      600s;

            # Disable Nginx's response size limit for streaming
            proxy_max_temp_file_size 0;
        }

        # ──────────────────────────────────────────────────────────────
        # API: All other backend endpoints
        # ──────────────────────────────────────────────────────────────

        location /api/ {
            limit_req  zone=api  burst=50  nodelay;

            proxy_pass              http://backend;
            proxy_http_version      1.1;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        X-Request-ID      $request_id;
            proxy_set_header        Connection        "";
            proxy_connect_timeout   10s;
            proxy_read_timeout      300s;
            proxy_send_timeout      60s;

            # Buffer backend responses for better throughput on
            # large JSON payloads (CSV exports, paginated lists)
            proxy_buffer_size       16k;
            proxy_buffers           8 32k;
            proxy_busy_buffers_size 64k;
        }

        # ──────────────────────────────────────────────────────────────
        # Health check — pass through to backend (no rate limit)
        # Used by Docker HEALTHCHECK and monitoring
        # ──────────────────────────────────────────────────────────────

        location = /api/health {
            proxy_pass              http://backend;
            proxy_http_version      1.1;
            proxy_set_header        Host              $host;
            proxy_set_header        Connection        "";
            proxy_connect_timeout   5s;
            proxy_read_timeout      5s;
            access_log              off;
        }

        # ──────────────────────────────────────────────────────────────
        # Static assets — aggressive caching
        #
        # Vite produces hashed filenames (e.g. index-4f3b2a1c.js)
        # so assets are safe to cache for 1 year with "immutable".
        # ──────────────────────────────────────────────────────────────

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|map)$ {
            try_files   $uri =404;
            expires     1y;
            add_header  Cache-Control "public, immutable";

            # Re-apply security headers (add_header in a child location
            # overrides parent — Nginx inheritance quirk)
            add_header  X-Content-Type-Options  "nosniff"  always;
            add_header  X-Frame-Options         "DENY"     always;

            access_log  off;
        }

        # ──────────────────────────────────────────────────────────────
        # Self-hosted fonts (Montserrat, JetBrains Mono)
        #
        # Served from /fonts/ with long cache and correct MIME type.
        # Air-gap compatible — no Google Fonts CDN dependency.
        # ──────────────────────────────────────────────────────────────

        location /fonts/ {
            try_files   $uri =404;
            expires     1y;
            add_header  Cache-Control "public, immutable";
            add_header  Access-Control-Allow-Origin "*";
            add_header  X-Content-Type-Options "nosniff" always;

            access_log  off;
        }

        # ──────────────────────────────────────────────────────────────
        # React SPA — catch-all for client-side routing
        #
        # All unmatched paths serve index.html so that React Router
        # can handle the route on the client side.
        # ──────────────────────────────────────────────────────────────

        location / {
            try_files  $uri $uri/ /index.html;

            # index.html itself must NOT be cached — it contains
            # references to the hashed JS/CSS bundles.  A stale
            # index.html would point to deleted assets after a deploy.
            location = /index.html {
                add_header  Cache-Control "no-cache, no-store, must-revalidate";
                add_header  Pragma        "no-cache";
                add_header  Expires       "0";

                # Re-apply security headers
                add_header  X-Content-Type-Options   "nosniff"                        always;
                add_header  X-Frame-Options          "DENY"                           always;
                add_header  X-XSS-Protection         "0"                              always;
                add_header  Referrer-Policy          "strict-origin-when-cross-origin" always;
            }
        }

        # ──────────────────────────────────────────────────────────────
        # Block common scanner paths
        # ──────────────────────────────────────────────────────────────

        location ~ /\.(env|git|svn|htaccess|htpasswd) {
            deny all;
            return 404;
        }

        location ~ ^/(wp-admin|wp-login|phpmyadmin|admin\.php|xmlrpc\.php) {
            deny all;
            return 404;
        }

        # Custom error pages (served from React SPA)
        error_page  404              /index.html;
        error_page  500 502 503 504  /index.html;
    }
}